<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>EPSM Manager</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="page">

    <!-- ================================================= -->
    <!-- HEADER                                             -->
    <!-- ================================================= -->

    <header class="page-header">

        <div class="logo">

            <img
                src="../assets/images/logo.svg"
                alt="È Pronto! Si Mangia">

        </div>

        <div class="title">

            <h1>EPSM Manager</h1>

            <p class="subtitle">

                Registro de Producción

            </p>

            <div class="title-divider">

                <span></span>

            </div>

        </div>

    </header>

    <!-- ================================================= -->
    <!-- MAIN LAYOUT                                        -->
    <!-- ================================================= -->

<main class="main-layout">

    <!-- ========================================= -->
    <!-- INFORMACIÓN GENERAL -->
    <!-- ========================================= -->

<section class="card full-width">

    <div class="card-header compact-header">

        <div class="header-title">

            <h2>

                <i class="fa-solid fa-calendar-days"></i>

                Información General

            </h2>

        </div>

        <div class="header-fields">

            <div class="inline-field">

                <label class="required">

                    Fecha

                </label>

                <input
                    type="date"
                    id="productionDate">

            </div>

            <div class="inline-field">

                <label class="required">

                    Turno

                </label>

                <select id="shift">

                </select>

            </div>

        </div>

    </div>

</section>

    <div class="form-layout">

        <div class="left-column">

            <!-- ========================================= -->
            <!-- OPERADORES -->
            <!-- ========================================= -->

            <section class="card card-dynamic operators-card">

                <div class="card-header">

                    <div class="card-title">

                        <h2>

                            <i class="fa-solid fa-users"></i>

                            Operadores

                        </h2>

                    </div>

                    <div class="card-toolbar">

                        <button
                            type="button"
                            id="addOperator">

                            + Operador

                        </button>

                    </div>

                </div>

                <div class="card-content">

                    <div class="table-container">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>Operador</th>

                                    <th width="60"></th>

                                </tr>

                            </thead>

                            <tbody id="operatorTable">

                            </tbody>

                        </table>

                    </div>

                </div>

            </section>


            <!-- ========================================= -->
            <!-- MASA -->
            <!-- ========================================= -->

            <section class="card">

                <div class="card-header">

                    <h2>

                        <i class="fa-solid fa-wheat-awn"></i>

                        Masa

                    </h2>

                </div>

<div class="card-body">

    <!-- ========================================= -->
    <!-- FILA 1 -->
    <!-- ========================================= -->

    <div class="form-group">

        <label class="required">
            Tipo de Masa
        </label>

        <select id="recipe"></select>

    </div>

    <!-- ========================================= -->
    <!-- FILA 2 - STANDARD -->
    <!-- ========================================= -->

    <div id="standardRecipe">

        <div class="form-group">

            <label class="required">
                Cantidad
            </label>

            <input
                type="number"
                id="standardDoughCount"
                min="1"
                value="1"
                required>

        </div>

    </div>

    <!-- ========================================= -->
    <!-- FILA 2 - SPECIAL -->
    <!-- ========================================= -->

    <div id="specialRecipe">

        <div class="form-group">

            <label class="required">
                Harina (g)
            </label>

            <input
                type="number"
                id="flour"
                min="0"
                placeholder="0">

        </div>

        <div class="form-group">

            <label class="required">
                Agua (L)
            </label>

            <input
                type="number"
                id="water"
                min="0"
                placeholder="0">

        </div>

        <div class="form-group">

            <label class="required">
                Otros Ingredientes (g)
            </label>

            <input
                type="number"
                id="otherIngredients"
                min="0"
                placeholder="0">

        </div>

    </div>

    <!-- ========================================= -->
    <!-- FILA 3 -->
    <!-- ========================================= -->

    <div class="recipe-summary-row">

        <div
            id="initialWeightContainer"
            class="form-group">

            <label>
                Peso Inicial (g)
            </label>

            <input
                type="number"
                id="initialWeight"
                readonly>

        </div>

        <div class="form-group">

            <label>
                Masa Sobrante Agregada (g)
            </label>

            <input
                type="number"
                id="leftoverAdded"
                min="0"
                placeholder="0">

        </div>

    </div>

</div>

            </section>
            
         <!-- ========================================= -->
            <!-- OBSERVACIONES -->
            <!-- ========================================= -->

            <section class="card">

                <div class="card-header">

                    <h2>

                        <i class="fa-solid fa-note-sticky"></i>

                        Observaciones

                    </h2>

                </div>

                <div class="card-body">

                    <div class="form-group">

                        <textarea
                            id="notes"
                            placeholder="Observaciones adicionales..."></textarea>

                    </div>

                </div>

            </section>
          
        </div>

        <div class="right-column">
           <!-- ========================================= -->
            <!-- PRODUCCIÓN -->
            <!-- ========================================= -->

            <section class="card card-dynamic production-card">

                <div class="card-header">

                    <div class="card-title">

                        <h2>

                            <i class="fa-solid fa-bread-slice"></i>

                            Producción

                        </h2>

                    </div>

                    <div class="card-toolbar">

                        <button
                            type="button"
                            id="addProduct">

                            + Producto

                        </button>

                    </div>

                </div>

                <div class="card-content">

                    <div class="table-container">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>Producto</th>

                                    <th width="140">Cantidad</th>

                                    <th width="70">Acción</th>

                                </tr>

                            </thead>

                            <tbody id="productionTable">

                            </tbody>

                        </table>

                    </div>

                </div>

                <div class="card-footer">

                    <button
                        type="button"
                        id="saveButton">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Guardar Producción

                    </button>

                </div>

            </section>


        </div>

    </div>

</main>
 <!-- ========================================= -->
<!-- HISTORIAL                                 -->
<!-- ========================================= -->

<section class="card history-card">

    <div class="card-header">

        <h2>

            <i class="fa-solid fa-clock-rotate-left"></i>

            Últimos Registros

        </h2>

    </div>

    <div class="card-body">

        <div class="table-container">

            <table class="table">

                <thead>

                    <tr>

                        <th width="120">Creado</th>

                        <th width="90">Últ. Actualizacion</th>

                        <th width="100">Turno</th>

                        <th width="240">Operadores</th>

                        <th width="350">Productos Fabricados</th>

                        <th width="110">Total Unidades</th>

                        <th width="90">Acción</th>

                    </tr>

                </thead>

                <tbody id="tablaRegistros">

                </tbody>

            </table>

        </div>

    </div>

</section>

    <!-- ========================================= -->
    <!-- FOOTER                                    -->
    <!-- ========================================= -->

    <footer>

        <small>

            © 2026 È Pronto! Si Mangia • EPSM Manager v1.0.0

        </small>

    </footer>

</div>

<!-- ========================================= -->
<!-- SUPABASE                                  -->
<!-- ========================================= -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config/supabase.js"></script>

<!-- ========================================= -->
<!-- SERVICES                                  -->
<!-- ========================================= -->

<script src="services/operator.js"></script>
<script src="services/product.js"></script>
<script src="services/recipe.js"></script>
<script src="services/shift.js"></script>
<script src="services/history.js"></script>
<script src="services/settings.js"></script>
<script src="services/edit.js"></script>
<script src="services/production.js"></script>

<!-- ========================================= -->
<!-- BUSINESS                                  -->
<!-- ========================================= -->

<script src="js/catalogs.js"></script>
<script src="js/recipeBehaviour.js"></script>
<script src="js/form.js"></script>
<script src="js/validation.js"></script>
<script src="js/errors.js"></script>
<script src="js/app.js"></script>

</body>

</html>
