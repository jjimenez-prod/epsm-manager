<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>EPSM Manager</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="page">

    <!-- ================================================= -->
    <!-- HEADER                                             -->
    <!-- ================================================= -->

    <header class="page-header">

        <div class="logo">

            <img
                src="../assets/images/logo.svg"
                alt="È Pronto! Si Mangia">

        </div>

        <div class="title">

            <h1>EPSM Manager</h1>

            <p class="subtitle">

                Registro de Producción

            </p>

            <div class="title-divider">

                <span></span>

            </div>

        </div>

    </header>

    <!-- ================================================= -->
    <!-- MAIN LAYOUT                                        -->
    <!-- ================================================= -->

    <main class="main-layout">

        <!-- ============================================= -->
        <!-- LEFT PANEL                                     -->
        <!-- ============================================= -->

        <aside class="left-panel">

            <!-- ========================================= -->
            <!-- INFORMACIÓN GENERAL                        -->
            <!-- ========================================= -->

            <section class="card">

                <div class="card-header">

                    <h2>

                        <i class="fa-solid fa-calendar-days"></i>

                        Información General

                    </h2>

                </div>

                <div class="card-body">

                    <div class="form-group">

                        <label class="required">

                            Fecha

                        </label>

                        <input
                            type="date"
                            id="productionDate">

                    </div>

                    <div class="form-group">

                        <label class="required">

                            Turno

                        </label>

                        <select id="shift">

                        </select>

                    </div>

                </div>

            </section>

            <!-- ========================================= -->
            <!-- OPERADORES                                 -->
            <!-- ========================================= -->

            <section class="card">

                <div class="section-header">

                    <h2>

                        <i class="fa-solid fa-users"></i>

                        Operadores

                    </h2>

                    <button
                        type="button"
                        id="addOperator">

                        + Operador

                    </button>

                </div>

                <div class="card-body">

                    <div class="table-container">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>

                                        Operador

                                    </th>

                                    <th width="60">

                                    </th>

                                </tr>

                            </thead>

                            <tbody id="operatorTable">

                            </tbody>

                        </table>

                    </div>

                </div>

            </section>
                        <!-- ========================================= -->
            <!-- MASA                                       -->
            <!-- ========================================= -->

            <section class="card">

                <div class="card-header">

                    <h2>

                        <i class="fa-solid fa-wheat-awn"></i>

                        Masa

                    </h2>

                </div>

                <div class="card-body">

                    <div class="form-group">

                        <label class="required">

                            Tipo de Masa

                        </label>

                        <select id="recipe">

                        </select>

                    </div>

                    <div id="specialRecipe">

                        <div class="form-group">

                            <label class="required">

                                Harina (g)

                            </label>

                            <input
                                type="number"
                                id="flour"
                                min="0"
                                value="0">

                        </div>

                        <div class="form-group">

                            <label class="required">

                                Agua (g)

                            </label>

                            <input
                                type="number"
                                id="water"
                                min="0"
                                value="0">

                        </div>

                        <div class="form-group">
                            
                            <label class="required">
                                
                                Otros Ingredientes (g)
                                
                            </label>
                            <input
                            type="number"
                            id="otherIngredients"
                            min="0"
                            value="0">
                            
                        </div>
                            

                    </div>

                    <div
                        id="initialWeightContainer"
                        class="form-group">

                        <label>

                            Peso Inicial (g)

                        </label>

                        <input
                            type="number"
                            id="initialWeight"
                            readonly>

                    </div>

                    <div class="form-group">

                        <label>

                            Masa Sobrante Agregada (g)

                        </label>

                        <input
                            type="number"
                            id="leftoverAdded"
                            min="0"
                            value="0">

                    </div>

                </div>

            </section>

            <!-- ========================================= -->
            <!-- OBSERVACIONES                              -->
            <!-- ========================================= -->

            <section class="card">

                <div class="card-header">

                    <h2>

                        <i class="fa-solid fa-note-sticky"></i>

                        Observaciones

                    </h2>

                </div>

                <div class="card-body">

                    <div class="form-group">

                        <textarea id="notes" placeholder="Observaciones adicionales..."></textarea>

                    </div>

                </div>

            </section>

        </aside>

        <!-- ============================================= -->
        <!-- RIGHT PANEL                                   -->
        <!-- ============================================= -->

        <section class="right-panel">

            <!-- ========================================= -->
            <!-- PRODUCCIÓN                                 -->
            <!-- ========================================= -->

            <section class="card">

                <div class="section-header">

                    <h2>

                        <i class="fa-solid fa-bread-slice"></i>

                        Producción

                    </h2>

                    <button
                        type="button"
                        id="addProduct">

                        + Producto

                    </button>

                </div>

                <div class="card-body">

                    <div class="table-container">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>

                                        Producto

                                    </th>

                                    <th width="140">

                                        Cantidad

                                    </th>

                                    <th width="70">

                                        Acción

                                    </th>

                                </tr>

                            </thead>

                            <tbody id="productionTable">

                            </tbody>

                        </table>

                    </div>
                                        <button
                        type="button"
                        id="saveButton">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Guardar Producción

                    </button>

                </div>

            </section>

            <!-- ========================================= -->
            <!-- HISTORIAL                                 -->
            <!-- ========================================= -->

            <section class="card history-card">

                <div class="card-header">

                    <h2>

                        <i class="fa-solid fa-clock-rotate-left"></i>

                        Últimos Registros

                    </h2>

                </div>

                <div class="card-body">

                    <div class="table-container">

                        <table class="table">

                            <thead>

                                <tr>

                                    <th width="120">

                                        Fecha

                                    </th>

                                    <th width="90">

                                        Hora

                                    </th>

                                    <th width="100">

                                        Turno

                                    </th>

                                    <th>

                                        Operadores

                                    </th>

                                    <th width="150">

                                        Receta

                                    </th>

                                    <th width="110">

                                        Productos

                                    </th>

                                    <th width="90">

                                        Acción

                                    </th>

                                </tr>

                            </thead>

                            <tbody id="tablaRegistros">

                            </tbody>

                        </table>

                    </div>

                </div>

            </section>

        </section>

    </main>

    <!-- ========================================= -->
    <!-- FOOTER                                    -->
    <!-- ========================================= -->

    <footer>

        <small>

            © 2026 È Pronto! Si Mangia • EPSM Manager v1.0.0

        </small>

    </footer>

</div>

<!-- ========================================= -->
<!-- SUPABASE                                  -->
<!-- ========================================= -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config/supabase.js"></script>

<!-- ========================================= -->
<!-- SERVICES                                  -->
<!-- ========================================= -->

<script src="services/operator.js"></script>
<script src="services/product.js"></script>
<script src="services/recipe.js"></script>
<script src="services/shift.js"></script>
<script src="services/history.js"></script>
<script src="services/settings.js"></script>
<script src="services/edit.js"></script>
<script src="services/production.js"></script>

<!-- ========================================= -->
<!-- BUSINESS                                  -->
<!-- ========================================= -->

<script src="js/catalogs.js"></script>
<script src="js/recipeBehaviour.js"></script>
<script src="js/form.js"></script>
<script src="js/validation.js"></script>
<script src="js/errors.js"></script>
<script src="js/app.js"></script>

</body>

</html>
